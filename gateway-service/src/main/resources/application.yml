server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8004
          predicates:
            - Path=/api/v1/auth/**
        - id: account-service
          uri: http://localhost:8001
          predicates:
            - Path=/api/v1/accounts/**
        - id: transactions-service
          uri: http://localhost:8002
          predicates:
            - Path=/api/v1/transactions/**,/api/v1/transaction-logs/**
        - id: users-service
          uri: http://localhost:8003
          predicates:
            - Path=/api/v1/users/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
