server:
  port: 8080

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

        - id: account-service
          uri: lb://ACCOUNT-SERVICE
          predicates:
            - Path=/api/v1/accounts/**

        - id: transactions-service
          uri: lb://TRANSACTIONS-SERVICE
          predicates:
            - Path=/api/v1/transactions/**
            - Path=/api/v1/transaction-logs/**

        - id: users-service
          uri: lb://USERS-SERVICE
          predicates:
            - Path=/api/v1/users/**
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"

# --- Eureka service discovery (added by patch_eureka_clients.py) ---
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://eureka-server:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${random.value}
