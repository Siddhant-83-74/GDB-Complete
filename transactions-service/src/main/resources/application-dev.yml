server:
  port: ${PORT:8002}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdb_transactions_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:anil}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


logging:
  level:
    root: INFO
    com.gdb.transactions: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  file:
    name: logs/transactions-service.log
    max-size: 10MB
    max-history: 30

