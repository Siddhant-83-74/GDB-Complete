server:
  port: ${PORT:9002}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gdb_transactions_db}
    username: ${DATABASE_USER:postgres}
    password: ${DATABASE_PASSWORD:anil}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000


logging:
  level:
    root: WARN
    com.gdb.transactions: INFO


